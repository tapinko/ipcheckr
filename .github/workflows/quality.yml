name: Quality Gates

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Src/IPCheckr.Client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Src/IPCheckr.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend Build/Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Src/IPCheckr.Api/IPCheckr.Api.sln

      - name: Build
        run: dotnet build Src/IPCheckr.Api/IPCheckr.Api.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test Src/IPCheckr.Api.Tests/IPCheckr.Api.Tests.csproj --configuration Release --no-build