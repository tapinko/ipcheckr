name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.7.3) — used as image tag and baked into APP_VERSION'
        required: true
      push_latest:
        description: 'Also push as :latest'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${{ secrets.DOCKERHUB_USERNAME }}/ipcheckr:${{ github.event.inputs.version }}"
          if [[ "${{ github.event.inputs.push_latest }}" == "true" ]]; then
            TAGS="${TAGS},${{ secrets.DOCKERHUB_USERNAME }}/ipcheckr:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          build-args: APP_VERSION=${{ github.event.inputs.version }}
