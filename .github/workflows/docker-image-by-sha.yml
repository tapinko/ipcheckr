name: Build and Push Docker Image from SHA

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Specific commit SHA to build from'
        required: true
      tag:
        description: 'Docker image tag (e.g. test, v0.7.3-rc1)'
        required: true
      version:
        description: 'Version string to bake into APP_VERSION (e.g. v0.7.3) — defaults to tag if omitted'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve APP_VERSION
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/Dockerfile
          push: true
          provenance: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ipcheckr:${{ github.event.inputs.tag }}
          build-args: APP_VERSION=${{ steps.version.outputs.value }}
